<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | Grant Finder</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-900: #0f172a;
            --bg-color: #f8fafc;
            --mesh-gradient: radial-gradient(at 0% 0%, hsla(217,100%,50%,1) 0, transparent 50%),
                             radial-gradient(at 50% 0%, hsla(162,100%,50%,1) 0, transparent 50%),
                             radial-gradient(at 100% 0%, hsla(38,100%,50%,1) 0, transparent 50%);
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--primary-900);
            background-image: var(--mesh-gradient);
            background-attachment: fixed;
            font-family: 'Inter', system-ui, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .logo-wrapper {
            display: inline-block;
            animation: float 6s ease-in-out infinite;
            margin-bottom: 40px;
        }
        .logo {
            width: 240px;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
            animation: logo-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center;
        }
        @keyframes logo-pop {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin: 0 0 20px;
            line-height: 1.1;
        }
        p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--mesh-gradient);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Grant Finder Logo" class="logo">
        </div>
        <h1>Optimizing Your <br><span style="color: #3b82f6;">Opportunity Radar</span></h1>
        <p>We're currently in Beta test mode. Synchronizing our grant datasets to ensure you have access to the most accurate funding intelligence. We'll be back soon. Thank you for your patience.</p>
        <div class="status-badge">
            <span class="dot"></span>
            Intelligence Core Updating
        </div>
    </div>
</body>
</html>
